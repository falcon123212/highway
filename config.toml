[ingestion]
chunk_size = 128
chunk_overlap = 32

[retrieval]
default_embedding_model = "BAAI/bge-base-en-v1.5"
default_fallback_embedding_model = "sentence-transformers/all-MiniLM-L6-v2"
default_reranker_model = "cross-encoder/ms-marco-MiniLM-L-6-v2"
default_rrf_k = 60.0
default_weight_bm25 = 0.6
default_weight_dense = 0.4
default_rescue_limit = 5

[governor]
cascade_budgets = [256, 321, 384, 512]
cpu_extractive_confidence_threshold = 0.85
